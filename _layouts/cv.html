<!doctype html>
<html lang="en">
<head>
  <meta charset=utf-8 />
  <title> {% if page.title %} {{ page.title }} | {% endif %} CV</title>
  <meta name="description" content="Arnaud Bletterer - Research Team Leader & Research Engineer specializing in Computer Graphics, Image/Geometry Processing, and Machine Learning." />
  <meta name="keywords" content="Arnaud Bletterer, Research Scientist, Research Team Leader, Research Engineer, Computer Graphics, Image Processing, Geometry Processing, Machine Learning, Resume, CV" />
  
  <!-- Open Graph / Facebook / LinkedIn -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{% if page.title %}{{ page.title }} - CV{% else %}Arnaud Bletterer - CV{% endif %}" />
  <meta property="og:description" content="Research Team Leader & Research Engineer specializing in Computer Graphics, Image/Geometry Processing, and Machine Learning." />
  <meta property="og:image" content="profile.jpg" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary" />
  <meta property="twitter:title" content="{% if page.title %}{{ page.title }} - CV{% else %}Arnaud Bletterer - CV{% endif %}" />
  <meta property="twitter:description" content="Research Team Leader & Research Engineer specializing in Computer Graphics, Image/Geometry Processing, and Machine Learning." />
  <meta property="twitter:image" content="profile.jpg" />

  <link href="media/{{ site.style }}-screen.css" type="text/css" rel="stylesheet" media="screen">
  <link href="media/{{ site.style }}-print.css" type="text/css" rel="stylesheet" media="print">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function() {
      const storedTheme = localStorage.getItem('theme');
      if (storedTheme) {
        document.documentElement.setAttribute('data-theme', storedTheme);
      } else {
        const userPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', userPrefersDark ? 'dark' : 'light');
      }
    })();
  </script>
</head>
<body>
  <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
  <div id="main">
    <div id="content">
    {{ content }}
    </div>
  </div>
  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>
</body>
</html>
