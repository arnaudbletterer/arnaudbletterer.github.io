<!doctype html>
<html lang="en">
<head>
  <meta charset=utf-8 />
  <title>{% if page.title %}{{ page.title | strip }} - CV{% else %}CV{% endif %} | Arnaud Bletterer</title>
  <meta name="description" content="Arnaud Bletterer - Research Team Leader & Research Engineer specializing in Computer Graphics, Image/Geometry Processing, and Machine Learning." />
  <meta name="keywords" content="Arnaud Bletterer, Research Scientist, Research Team Leader, Research Engineer, Computer Graphics, Image Processing, Geometry Processing, Machine Learning, Resume, CV" />
  
  <!-- Canonical -->
  <link rel="canonical" href="{{ site.url }}/resume.html" />

  <!-- Open Graph / Facebook / LinkedIn -->
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:title" content="{% if page.title %}{{ page.title | strip }} - CV{% else %}Arnaud Bletterer - CV{% endif %}" />
  <meta property="og:description" content="Research Team Leader & Research Engineer specializing in Computer Graphics, Image/Geometry Processing, and Machine Learning." />
  <meta property="og:url" content="{{ site.url }}/resume.html" />
  <meta property="og:image" content="{{ site.url }}/profile.jpg" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{% if page.title %}{{ page.title | strip }} - CV{% else %}Arnaud Bletterer - CV{% endif %}" />
  <meta name="twitter:description" content="Research Team Leader & Research Engineer specializing in Computer Graphics, Image/Geometry Processing, and Machine Learning." />
  <meta name="twitter:image" content="{{ site.url }}/profile.jpg" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ site.url }}/profile.jpg" />

  <link href="media/{{ site.style }}-screen.css" type="text/css" rel="stylesheet" media="screen">
  <link href="media/{{ site.style }}-print.css" type="text/css" rel="stylesheet" media="print">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html { scroll-behavior: smooth; }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
    }

    /* Page fade-in */
    @keyframes cv-fade-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media screen { #main { animation: cv-fade-in 0.4s ease both; } }

    /* Floating Home button */
    #home-btn {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 1000;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border-light);
      background: var(--bg-card);
      color: var(--primary);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    #home-btn:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover-btn);
    }
    #home-btn svg { width: 0.85rem; height: 0.85rem; flex-shrink: 0; }
    @media screen and (max-width: 768px) {
      #home-btn { top: auto; bottom: 1.5rem; left: 1.5rem; }
    }
    
    /* Coherent Footer */
    .site-footer {
      border-top: 1px solid var(--border-color);
      padding: 2rem 0;
      margin: 4rem auto 2rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
      width: 90%;
      max-width: 1200px;
    }
    @media print {
      .site-footer { display: none; }
    }
  </style>
  <script>
    (function() {
      const storedTheme = localStorage.getItem('theme');
      if (storedTheme) {
        document.documentElement.setAttribute('data-theme', storedTheme);
      } else {
        const userPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', userPrefersDark ? 'dark' : 'light');
      }
    })();
  </script>
  {% if site.umami_id %}
  <!-- Umami Analytics -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="{{ site.umami_id }}"></script>
  {% endif %}
</head>
<body>
  <button id="nav-toggle" type="button" aria-expanded="false" aria-controls="section-toc" aria-label="Open navigation menu">
    <span class="nav-toggle-bar"></span>
    <span class="nav-toggle-bar"></span>
    <span class="nav-toggle-bar"></span>
  </button>
  <aside id="section-toc" data-state="closed" aria-label="On this page">
    <div class="toc-inner">
      <ul class="toc-list" role="list">
        <li class="toc-top-item"><a href="#top" class="toc-link toc-link-top" id="toc-top-link"><span class="toc-arrow">↑</span>Profile</a></li>
        <li><a href="#employment" class="toc-link"><span class="toc-dot"></span>Employment</a></li>
        <li><a href="#education" class="toc-link"><span class="toc-dot"></span>Education</a></li>
        <li><a href="#skills" class="toc-link"><span class="toc-dot"></span>Skills</a></li>
        <li><a href="#miscellaneous" class="toc-link"><span class="toc-dot"></span>Miscellaneous</a></li>
        <li><a href="#publications" class="toc-link"><span class="toc-dot"></span>Publications</a></li>
      </ul>
    </div>
  </aside>
  <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
  <a id="home-btn" href="/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Home
  </a>
  <div id="main">
    <div id="content">
    {{ content }}
    </div>
    {% include footer.html %}
  </div>
  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });

    // Page-exit transition
    document.addEventListener('click', (e) => {
      const a = e.target.closest('a[href]');
      if (!a) return;
      const href = a.getAttribute('href');
      if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('http') || a.target === '_blank') return;
      e.preventDefault();
      document.body.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
      document.body.style.opacity = '0';
      document.body.style.transform = 'translateY(-8px)';
      setTimeout(() => { window.location.href = href; }, 260);
    });
  </script>
  <script>
    (function() {
      const toc = document.getElementById('section-toc');
      const toggle = document.getElementById('nav-toggle');
      if (!toc || !toggle) return;
      const links = toc.querySelectorAll('.toc-link');
      const headings = Array.from(document.querySelectorAll('h2[id]'));
      if (!headings.length) return;

      const linkById = new Map();
      links.forEach(link => {
        const id = link.getAttribute('href').slice(1);
        linkById.set(id, link);
      });

      let currentActiveId = null;
      function setActive(id) {
        if (id === currentActiveId) return;
        currentActiveId = id;
        // Use a fresh querySelectorAll to avoid any stale NodeList issues
        const allLinks = toc.querySelectorAll('.toc-link');
        allLinks.forEach(l => {
          l.classList.remove('is-active');
          l.removeAttribute('aria-current');
        });
        const active = linkById.get(id);
        if (active) {
          active.classList.add('is-active');
          active.setAttribute('aria-current', 'location');
        }
      }

      function clearActive() {
        if (currentActiveId === null) return;
        currentActiveId = null;
        const allLinks = toc.querySelectorAll('.toc-link');
        allLinks.forEach(l => {
          l.classList.remove('is-active');
          l.removeAttribute('aria-current');
        });
      }

      function isMobile() {
        return window.matchMedia('(max-width: 1279px)').matches;
      }

      function setMenuOpen(open) {
        toc.setAttribute('data-state', open ? 'open' : 'closed');
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        toggle.setAttribute('aria-label', open ? 'Close navigation menu' : 'Open navigation menu');
        if (isMobile()) {
          document.body.style.overflow = open ? 'hidden' : '';
        }
      }

      toggle.addEventListener('click', () => {
        const isOpen = toc.getAttribute('data-state') === 'open';
        setMenuOpen(!isOpen);
      });

      links.forEach(link => {
        link.addEventListener('click', () => {
          // Don't set active immediately — let the scroll-spy progressively
          // highlight sections as the page smooth-scrolls to the destination
          if (isMobile()) {
            setMenuOpen(false);
          }
        });
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && toc.getAttribute('data-state') === 'open') {
          setMenuOpen(false);
          toggle.focus();
        }
      });

      window.addEventListener('resize', () => {
        if (!isMobile() && toc.getAttribute('data-state') === 'open') {
          setMenuOpen(false);
        }
      });

      // Scroll-spy: find the last heading whose top is at or above the trigger line
      function updateActiveOnScroll() {
        const triggerY = window.innerHeight * 0.2;
        let activeId = null;
        for (let i = 0; i < headings.length; i++) {
          const rect = headings[i].getBoundingClientRect();
          if (rect.top <= triggerY) {
            activeId = headings[i].id;
          } else {
            break;
          }
        }
        if (activeId) {
          setActive(activeId);
        } else {
          clearActive();
        }
      }

      // Scroll-spy: use IntersectionObserver for reliable detection across all scroll methods
      function updateActiveOnScroll() {
        const triggerY = window.innerHeight * 0.2;
        // Default to 'top' so the Profile link is highlighted when the user
        // is above all section headings
        let activeId = 'top';
        for (let i = 0; i < headings.length; i++) {
          const rect = headings[i].getBoundingClientRect();
          if (rect.top <= triggerY) {
            activeId = headings[i].id;
          } else {
            break;
          }
        }
        setActive(activeId);
      }

      // Handle "Top" link click
      const topLink = document.getElementById('toc-top-link');
      if (topLink) {
        topLink.addEventListener('click', (e) => {
          e.preventDefault();
          window.scrollTo({ top: 0, behavior: 'smooth' });
          setActive('top');
          if (isMobile()) {
            setMenuOpen(false);
          }
        });
      }

      if ('IntersectionObserver' in window) {
        const observer = new IntersectionObserver(() => {
          // Double rAF ensures layout is fully updated before reading positions
          requestAnimationFrame(() => {
            requestAnimationFrame(updateActiveOnScroll);
          });
        }, {
          rootMargin: '0px 0px -80% 0px',
          threshold: [0, 0.25, 0.5, 0.75, 1]
        });
        headings.forEach(h => observer.observe(h));
      } else {
        // Fallback for older browsers
        window.addEventListener('scroll', updateActiveOnScroll, { passive: true });
      }

      // Also update on resize and on initial load
      window.addEventListener('resize', updateActiveOnScroll, { passive: true });
      updateActiveOnScroll();

      // Initial call
      updateActiveOnScroll();
    })();
  </script>
</body>
</html>
